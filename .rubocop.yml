plugins:
  - rubocop-rspec
  - rubocop-sorbet

AllCops:
  TargetRubyVersion: 4.0
  NewCops: enable
  SuggestExtensions: false

Style/FrozenStringLiteralComment:
  Enabled: true

Style/StringLiterals:
  EnforcedStyle: double_quotes

Layout/LineLength:
  Max: 120

Sorbet/StrictSigil:
  Enabled: true
  Include:
    - "lib/**/*.rb"

Sorbet/FalseSigil:
  Enabled: true
  Include:
    - "spec/**/*.rb"
